# Traefik v3 static configuration — NiteOS VPS (31.97.126.86)
# Mounted at /etc/traefik/traefik.yml inside the Traefik container.
#
# TLS: Cloudflare DNS-01 challenge (domain is proxied via Cloudflare).
#      Set CF_DNS_API_TOKEN and ACME_EMAIL in infra/cloud.env.
#
# M5.6 CUTOVER COMPLETE: Traefik is on :80/:443. nginx stopped 2026-03-17.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: false

ping: {}

log:
  level: INFO
  format: json

accessLog:
  format: json
  fields:
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        X-Forwarded-For: keep

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: infra_proxy
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  cloudflare:
    acme:
      # Set ACME_EMAIL and CF_DNS_API_TOKEN in infra/cloud.env
      email: "${ACME_EMAIL}"
      storage: /data/acme.json
      dnsChallenge:
        provider: cloudflare
        # CF_DNS_API_TOKEN is read from env automatically by Traefik's Cloudflare provider
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
