# Prometheus configuration — NiteOS VPS A
# Scrapes /metrics from all 13 Go services every 15s.
# All services are on the 'core' Docker network (internal).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    cluster: vps-a

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8000']

  - job_name: auth
    static_configs:
      - targets: ['auth:8010']

  - job_name: profiles
    static_configs:
      - targets: ['profiles:8020']

  - job_name: ledger
    static_configs:
      - targets: ['ledger:8030']

  - job_name: wallet
    static_configs:
      - targets: ['wallet:8040']

  - job_name: ticketing
    static_configs:
      - targets: ['ticketing:8050']

  - job_name: payments
    static_configs:
      - targets: ['payments:8060']

  - job_name: devices
    static_configs:
      - targets: ['devices:8070']

  - job_name: catalog
    static_configs:
      - targets: ['catalog:8080']

  - job_name: orders
    static_configs:
      - targets: ['orders:8090']

  - job_name: sessions
    static_configs:
      - targets: ['sessions:8100']

  - job_name: sync
    static_configs:
      - targets: ['sync:8110']

  - job_name: reporting
    static_configs:
      - targets: ['reporting:8120']
