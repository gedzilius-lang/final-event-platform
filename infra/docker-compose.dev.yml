# Local development stack — Postgres + Redis only.
# Run with: make dev-up
# This does NOT run service-1. VPS A continues to run service-1 unchanged.
# NiteOS services are run directly (go run) during development, not via Docker.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: niteos
      POSTGRES_USER: niteos
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niteos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass devpassword
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
